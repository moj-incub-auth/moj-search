---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moj-search-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: moj-search-api
  template:
    metadata:
      labels:
        app: moj-search-api
    spec:
      containers:
      - name: api
        image: moj-search-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: MILVUS_HOST
          value: "milvus-standalone"
        - name: MILVUS_PORT
          value: "19530"
        - name: MILVUS_COLLECTION
          value: "knowledge_base"
        - name: EMBEDDING_API_URL
          value: "http://qwen3-embedding-predictor.vllm-serving.svc.cluster.local"
        - name: EMBEDDING_API_MODEL
          value: "qwen3-embedding"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: moj-search-api
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: moj-search-api