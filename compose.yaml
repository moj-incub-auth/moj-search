services:
  # MOJ Search API service
  moj-search-api:
    container_name: moj-search-api
    image: moj-search-api:latest
    ports:
      - "8080:8080"
    environment:
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - MILVUS_COLLECTION=knowledge_base
      - EMBEDDING_API_MODEL=nomic-ai/nomic-embed-text-v1.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

networks:
  default:
    name: milvus
    external: true
